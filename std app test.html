<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AE Vision</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root { --bg: #0d1117; --card: #161b22; --accent: #e2b04a; --text: #e6e6e6; --danger: #b22222; --header-bg: #1a1a2e; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Tajawal', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; align-items: center; }
        .header { width: 100%; background: var(--header-bg); padding: 16px; text-align: center; border-bottom: 3px solid var(--accent); display: flex; align-items: center; justify-content: center; gap: 12px; }
        .header img { width: 48px; height: 48px; border-radius: 50%; border: 2px solid var(--accent); }
        .header h1 { font-size: 24px; color: var(--accent); }
        .container { width: 100%; max-width: 420px; padding: 16px; flex: 1; }
        .scan-btn { background: var(--accent); color: #000; border: none; padding: 14px 24px; border-radius: 30px; font-size: 18px; font-weight: bold; width: 100%; cursor: pointer; margin: 16px 0; }
        #reader { width: 100%; border-radius: 12px; overflow: hidden; margin: 16px 0; }
        .student-list { margin-top: 16px; background: var(--card); border-radius: 16px; padding: 12px; }
        .student-list h3 { color: var(--accent); margin-bottom: 8px; }
        .student-item { background: rgba(255,255,255,0.05); border-radius: 10px; padding: 12px; margin: 8px 0; display: flex; justify-content: space-between; align-items: center; }
        .student-name { font-size: 16px; font-weight: bold; }
        .student-score { color: var(--accent); font-size: 14px; }
        .delete-btn { background: var(--danger); border: none; color: white; padding: 8px 14px; border-radius: 20px; cursor: pointer; font-size: 14px; }
        .popup { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); justify-content: center; align-items: center; z-index: 100; }
        .popup.active { display: flex; }
        .popup-card { background: var(--card); border-radius: 20px; padding: 24px; width: 90%; max-width: 360px; text-align: center; animation: slideUp 0.3s ease; max-height: 85vh; overflow-y: auto; }
        @keyframes slideUp { from { transform: translateY(50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .section-title { color: var(--accent); font-size: 18px; margin: 15px 0 8px 0; border-bottom: 1px solid #333; padding-bottom: 4px; }
        .exam-row, .absence-row { background: rgba(255,255,255,0.04); padding: 8px 10px; border-radius: 8px; margin: 4px 0; font-size: 14px; }
    </style>
</head>
<body>
    <div class="header">
        <img src="logo.png" alt="AE Vision Logo" onerror="this.style.display='none'">
        <h1>AE Vision</h1>
    </div>
    <div class="container">
        <button class="scan-btn" id="scanButton" onclick="startScan()">📷 مسح QR</button>
        <div id="reader"></div>
        <p style="text-align:center; color:#aaa; font-size:14px; margin-top:12px;">💡 يمكنك حفظ حتى 5 طلاب على هاتفك والاطلاع عليهم في أي وقت</p>
        <div class="student-list" id="studentListContainer" style="display:none;">
            <h3>الطلاب</h3>
            <div id="studentList"></div>
        </div>
    </div>
    <!-- نافذة تفاصيل الطالب -->
    <div class="popup" id="detailPopup">
        <div class="popup-card">
            <img src="logo.png" style="width:60px; border-radius:50%;" onerror="this.style.display='none'">
            <h2 id="detailName" style="color:var(--accent); margin:12px 0;"></h2>
            <div id="detailScore" style="font-size: 24px; font-weight: bold;"></div>
            <div id="detailRank" style="margin:8px 0;"></div>
            <div id="detailEval" style="color:#aaa; font-size:14px;"></div>
            <div id="detailExams" style="color:#aaa; font-size:14px;"></div>
            <div id="detailAbsences" style="color:#aaa; font-size:14px;"></div>
            <button onclick="closeDetail()" style="background:var(--accent); border:none; padding:10px 30px; border-radius:20px; margin-top:16px; color:#000; font-weight:bold;">إغلاق</button>
        </div>
    </div>

    <script>
/////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx5ZUef11RjJznJ7UZY7lQSNVWhhhylGcinQBE7LGpvHn6UUGFDjNvQQIIww7kvbKoXRA/exec";
        let scannedStudents = [];
        let html5QrCode;
        const saved = localStorage.getItem('scannedStudents');
        if (saved) { scannedStudents = JSON.parse(saved); renderStudentList(); }
        if ('Notification' in window && Notification.permission === 'default') {
            Notification.requestPermission();
        }
        function extractId(scannedText) {
            try {
                const url = new URL(scannedText);
                return url.searchParams.get('id') || scannedText;
            } catch(e) {
                return scannedText;
            }
        }

        async function startScan() {
            if (scannedStudents.length >= 5) { alert("الحد الأقصى 5 طلاب"); return; }
            if (html5QrCode) { try { html5QrCode.stop(); } catch(e) {} }
            html5QrCode = new Html5Qrcode("reader");
            document.getElementById('scanButton').style.display = 'none';
            try {
                await html5QrCode.start(
                    { facingMode: "environment" },
                    { fps: 10, qrbox: { width: 250, height: 250 } },
                    async (code) => {
                        html5QrCode.stop();
                        document.getElementById('scanButton').style.display = 'block';
                        const studentId = extractId(code.trim());
                        await fetchAndShowStudent(studentId);
                    },
                    () => {}
                );
            } catch(err) { 
                alert("تعذر الوصول إلى الكاميرا"); 
                document.getElementById('scanButton').style.display = 'block';
            }
        }

        async function fetchAndShowStudent(id) {
            try {
                const resp = await fetch(SCRIPT_URL + "?format=json&id=" + id);
                const student = await resp.json();
                if (student.error) throw new Error(student.error);

                const fullStudent = {
                    id: id,
                    Name: student.Name || "غير معروف",
                    TotalScore: student["Total Score"] || "0",
                    RankGroup: student["الترتيب على المجموعة"] || "-",
                    RankGrade: student["الترتيب على الصف"] || "-",
                    Evaluations: student["Evaluations"] || "لا يوجد",
                    Exams: student["Exams"] || "لا يوجد",
                    Absences: student["Absences"] || "لا يوجد",
                    lastExams: student["Exams"] || ""  
                };

                const existingIndex = scannedStudents.findIndex(s => s.id === id);
                if (existingIndex === -1) {
                    if (scannedStudents.length >= 5) {
                        alert("القائمة ممتلئة (5 طلاب).");
                        return;
                    }
                    scannedStudents.push(fullStudent);
                } else {
                    scannedStudents[existingIndex] = fullStudent;
                }

                localStorage.setItem('scannedStudents', JSON.stringify(scannedStudents));
                renderStudentList();
                showStudentPopup(fullStudent);

            } catch(e) { 
                alert("فشل جلب البيانات"); 
            }
        }

        function showStudentPopup(s) {
            document.getElementById('detailName').textContent = s.Name;
            document.getElementById('detailScore').innerHTML = `🏅 ${s.TotalScore}`;
            document.getElementById('detailRank').innerHTML = `📊 ترتيب المجموعة: ${s.RankGroup}<br>📈 ترتيب الصف: ${s.RankGrade}`;

            let evalHtml = '<div class="section-title">⭐ التقييمات</div>';
            if (s.Evaluations && s.Evaluations.trim() !== 'لا يوجد' && s.Evaluations.trim() !== '') {
                const lines = s.Evaluations.split(',').filter(l => l.trim() !== '');
                lines.forEach(line => {
                    evalHtml += `<div class="exam-row">${line.trim()}</div>`;
                });
            } else {
                evalHtml += '<div class="exam-row">لا يوجد تقييمات</div>';}
            
            document.getElementById('detailEval').innerHTML = evalHtml;
            let examsHtml = '<div class="section-title">🧮 الامتحانات</div>';
            if (s.Exams && s.Exams.trim() !== 'لا يوجد' && s.Exams.trim() !== '') {
                const lines = s.Exams.split('\n').filter(l => l.trim() !== '');
                lines.forEach(line => {
                    const match = line.match(/التاريخ:\s*(.*?)\s*[-–]\s*الدرجة:\s*(.*)/);
                    if (match) {
                        examsHtml += `<div class="exam-row">📅 ${match[1].trim()} — ${match[2].trim()}</div>`;
                    } else {
                        examsHtml += `<div class="exam-row">${line}</div>`;
                    }
                });
            } else {
                examsHtml += '<div class="exam-row">لا يوجد امتحانات</div>';
            }
            document.getElementById('detailExams').innerHTML = examsHtml;

            let absencesHtml = '<div class="section-title">🕓 سجل الغياب</div>';
            if (s.Absences && s.Absences.trim() !== 'لا يوجد' && s.Absences.trim() !== '') {
                const lines = s.Absences.split('\n').filter(l => l.trim() !== '');
                lines.forEach(line => {
                    const d = line.match(/(\d{4}-\d{2}-\d{2})/);
                    if (d) {
                        absencesHtml += `<div class="absence-row">📌 ${d[1]}</div>`;
                    } else {
                        absencesHtml += `<div class="absence-row">${line}</div>`;
                    }
                });
            } else {
                absencesHtml += '<div class="absence-row">لا يوجد غياب</div>';
            }
            document.getElementById('detailAbsences').innerHTML = absencesHtml;

            document.getElementById('detailPopup').classList.add('active');
        }

        function renderStudentList() {
            const c = document.getElementById('studentListContainer');
            const l = document.getElementById('studentList');
            if (scannedStudents.length > 0) {
                c.style.display = 'block';
                l.innerHTML = scannedStudents.map((s,i) => `
                    <div class="student-item" onclick="showStudentFromList(${i})" style="cursor:pointer;">
                        <div>
                            <div class="student-name">${s.Name}</div>
                            <div class="student-score">الدرجة: ${s.TotalScore}</div>
                        </div>
                        <button class="delete-btn" onclick="event.stopPropagation(); removeStudent(${i})">حذف</button>
                    </div>`).join('');
            } else { c.style.display = 'none'; }
        }

        function showStudentFromList(index) {
            const s = scannedStudents[index];
            if (s) showStudentPopup(s);
        }

        function removeStudent(i) { 
            scannedStudents.splice(i,1); 
            localStorage.setItem('scannedStudents', JSON.stringify(scannedStudents)); 
            renderStudentList(); 
        }

        function closeDetail() { 
            document.getElementById('detailPopup').classList.remove('active'); 
        }-
        async function checkForNewExams() {
            if (!('Notification' in window) || Notification.permission !== 'granted') return;
            if (scannedStudents.length === 0) return;

            for (const saved of scannedStudents) {
                try {
                    const resp = await fetch(SCRIPT_URL + "?format=json&id=" + saved.id);
                    const student = await resp.json();
                    if (student.error) continue;

                    const currentExams = student["Exams"] || "";
                    const oldExams = saved.lastExams || "";

                    if (currentExams !== oldExams && currentExams !== "لا يوجد") {
                        const newDates = currentExams.match(/التاريخ:\s*(\d{4}-\d{2}-\d{2})/g);
                        const oldDates = oldExams.match(/التاريخ:\s*(\d{4}-\d{2}-\d{2})/g) || [];

                        if (newDates) {
                            const latestNewDate = newDates[newDates.length-1].match(/\d{4}-\d{2}-\d{2}/)[0];
                            if (!oldDates.some(d => d.includes(latestNewDate))) {
                                new Notification("AE Vision", {
                                    body: `تم تسجيل نتيجة امتحان الطالب "${saved.Name}" بتاريخ ${latestNewDate}`,
                                    icon: 'logo.png'
                                });
                            }
                        }
                        saved.lastExams = currentExams;
                        localStorage.setItem('scannedStudents', JSON.stringify(scannedStudents));}} catch(e) { /* فشل صامت */ }}}
        setInterval(checkForNewExams, 300000); 
    </script>
</body>
</html>
